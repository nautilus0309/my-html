            if (bottomdrawer.style.bottom === '0px' && !bottomdrawer.contains(e.target) && !bottomtrigger.contains(e.target)) {

        // 获取底部联系我们元素

        function openDrawer() {
            sidebarDrawer.style.right = '10px'; // 抽屉滑出

            }
            app.open_side_drawer = true;
        }

        // 关闭抽屉函数：抽屉收回，内容归位
        function closeDrawer() {
            sidebarDrawer.style.right = '-335px'; // 抽屉收回
            if (aboutUsContent) {
                aboutUsContent.style.transform = 'translateX(0px)'; // 内容归位
            }

        }

        // 点击菜单触发区域，打开抽屉
        menuTrigger.addEventListener('click', function (e) {
            e.preventDefault();
            const result = adjustSidebarHeight();
            openDrawer();

        document.addEventListener('click', function (e) {
            console.log(e.target)
            if (sidebarDrawer.style.right === '10px' && !sidebarDrawer.contains(e.target) && !menuTrigger.contains(e.target)) {

        });

        // 点击抽屉内关闭按钮，关闭抽屉
        const menuCloseTrigger = document.getElementById('menu-close-trigger');

            menuCloseTrigger.addEventListener('click', function (e) {
                e.preventDefault();
                closeDrawer();
            });
        }

        // 在按下 ESC 时也关闭抽屉
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && sidebarDrawer.style.right === '10px') {
                closeDrawer();
            }
        });

        // 页面滚动时自动关闭抽屉
        window.addEventListener('scroll', function () {
            if (sidebarDrawer.style.right === '10px') {
                closeDrawer();
            }
        });

        // 计算底部div露出的高度
        function calculateBottomDivVisibleHeight() {
            if (!bottomDiv) {
                console.warn('未找到底部div元素');
                return 0;
            }

            // 获取底部div的位置信息
            const rect = bottomDiv.getBoundingClientRect();
            const windowHeight = window.innerHeight;

            // 计算底部div在视口中的可见部分高度
            if (rect.top >= windowHeight) {
                // 完全在视口下方，不可见
                return 0;
            } else if (rect.bottom <= 0) {
                // 完全在视口上方，不可见
                return 0;
            } else {
                // 部分或完全可见
                const visibleTop = Math.max(rect.top, 0);
                const visibleBottom = Math.min(rect.bottom, windowHeight);
                return Math.max(0, visibleBottom - visibleTop);
            }
        }

        // 动态调整sidebar-drawer高度
        function adjustSidebarHeight() {
            // 获取底部div露出的高度
            const bottomDivVisibleHeight = calculateBottomDivVisibleHeight();

            // 获取视口高度
            const viewportHeight = window.innerHeight;

            // 计算sidebar-drawer的新高度
            let newHeight;

            if (bottomDivVisibleHeight > 0) {
                // 底部div可见时，保持8px间距
                newHeight = viewportHeight - bottomDivVisibleHeight - 18;
            } else {
                // 底部div不可见时，与网页底部保持8px间距
                newHeight = viewportHeight - 18;
            }

            // 确保高度不小于最小值
            const minHeight = 200; // 最小高度200px
            newHeight = Math.max(newHeight, minHeight);

            // 应用新高度
            sidebarDrawer.style.height = newHeight + 'px';
            sidebarDrawer.style.maxHeight = newHeight + 'px';

            // 输出调试信息
            console.log('底部div可见高度:', bottomDivVisibleHeight + 'px');
            console.log('sidebar-drawer新高度:', newHeight + 'px');
            console.log('视口高度:', viewportHeight + 'px');

            return {
                bottomDivVisibleHeight: bottomDivVisibleHeight,
                sidebarHeight: newHeight,
                viewportHeight: viewportHeight
            };
        }

        function handleAdjustClick() {

            const result = adjustSidebarHeight();
