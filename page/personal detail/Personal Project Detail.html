                            "left_detail": `详情：
                        设计灵感：源于沙漠中的海市蜃楼与探险之旅。为诠释这种虚实交织的氛围，我选用呈现朦胧感的透明PC材质，搭配富有沙漠质感的紫铜，共同构建这个主题。

                        愿这趟LOCATION 55° 的沙漠之旅，能带你穿越海市蜃楼，在八芒星的指引下，抵达属于你的宝藏之地。`,

                            "left_detail": `详情：
                        关于命名：我之前很喜欢一把套件S7 elephant，但是苦于国内没有渠道，黄鱼上也很难收到，于是我便萌生了打造自己键盘的想法——我也要做一把大边框的键盘。设计出来之后，圆润的造型让我联想到一个巨大的蛋，自然而然我就给他起名为蛋60，后续为了设计方便就化为DAMN60，谐音梗的加入也让套件多了一层风趣的感觉。
                        首先是配列：60配列大家见得多了，无棉和磁轴套件采用较多的配列。这次我想给到大家一个终极版，满足不同玩家的需求，具体如图所示。
                        支持分裂退格，iso回车（七字回车），分裂左右shift，hhkb，wkl，wk，还可以删掉顶层的r4变成一个类似40的配列，同样的这个40也支持iso回车（七字回车），分裂左右shift，hhkb，wkl，wk。（部分配列需要更换上盖的小配件）
                        同时在r4，caps位置计划加入轴座灯，方便大家安装灯帽，也为后续的配件增添更多的可玩性。
                        其次是外观设计：设计核心风格大致是大边框+大弧度大圆角。在视觉上更加圆润，弱化边和角，同时留出一条正侧面的腰线，使套件在视觉上圆润而不会丢失造型。
                        为了舒适考虑，打字角度为7°，搭配原厂键帽或者球帽都能有不错的输入体验。同时大边框的设计也能在输入时充当手托。
                        接着是功能设计：如上图所示，为了支持hhkb以及wkl配列，设计了可以安装在套件上盖上的挡块，延续了上盖的弧度，所以安装上也不会显得突兀，除了作为遮挡作用，也可用于拼色，增添键盘色彩。
                        同时为了增添键盘的趣味性，去掉r4的键之后，可以安装一个透光的装饰条（也可替换为实色的铝装饰条，有动手能力的朋友可以更换为例如铜的其他材质，并在上面雕刻），灯关来源于r4的轴座灯。
                        以上变化仅是通过更换配件达到的效果，并不需要更换定位板。
                        接下来我们来看看结构设计：由于内胆设计并不是我的强项，所以在结构上使用了比较传统的保证不会错的螺丝结构，通过大上盖天包地将上下盖的接缝隐藏在底部，底部嵌入一整块大配重（黄铜/不锈钢/铝），配重内部刻有工作室logo，外部刻有套件名称。在内胆部分也选择的是较为传统的硅胶套gasket，通过分离小板将c口引至后部。
                        厚实的外壳和配重能有效控制声音，抑制共振，相信最终这套方案能呈现非常好的声音效果。
                        也不能忘了包装设计：整体走的是简洁风，突出套件的圆润和精致。
                        最后是整体的渲染图：由于大边框的套件上球帽会更美观，所以这次渲染的键帽模型均来自于jtk的hsa高度的光面键帽，感谢江总的支持。

        // 计算底部div露出的高度
        function calculateBottomDivVisibleHeight() {
            if (!bottomDiv) {
                console.warn('未找到底部div元素');
                return 0;
            }

            // 获取底部div的位置信息
            const rect = bottomDiv.getBoundingClientRect();
            const windowHeight = window.innerHeight;

            // 计算底部div在视口中的可见部分高度
            if (rect.top >= windowHeight) {
                // 完全在视口下方，不可见
                return 0;
            } else if (rect.bottom <= 0) {
                // 完全在视口上方，不可见
                return 0;
            } else {
                // 部分或完全可见
                const visibleTop = Math.max(rect.top, 0);
                const visibleBottom = Math.min(rect.bottom, windowHeight);
                return Math.max(0, visibleBottom - visibleTop);
            }
        }

        // 动态调整sidebar-drawer高度
        function adjustSidebarHeight() {
            // 获取底部div露出的高度
            const bottomDivVisibleHeight = calculateBottomDivVisibleHeight();

            // 获取视口高度
            const viewportHeight = window.innerHeight;

            // 计算sidebar-drawer的新高度
            let newHeight;

            if (bottomDivVisibleHeight > 0) {
                // 底部div可见时，保持8px间距
                newHeight = viewportHeight - bottomDivVisibleHeight - 18;
            } else {
                // 底部div不可见时，与网页底部保持8px间距
                newHeight = viewportHeight - 18;
            }

            // 确保高度不小于最小值
            const minHeight = 200; // 最小高度200px
            newHeight = Math.max(newHeight, minHeight);

            // 应用新高度
            sidebarDrawer.style.height = newHeight + 'px';
            sidebarDrawer.style.maxHeight = newHeight + 'px';

            // 输出调试信息
            console.log('底部div可见高度:', bottomDivVisibleHeight + 'px');
            console.log('sidebar-drawer新高度:', newHeight + 'px');
            console.log('视口高度:', viewportHeight + 'px');

            return {
                bottomDivVisibleHeight: bottomDivVisibleHeight,
                sidebarHeight: newHeight,
                viewportHeight: viewportHeight
            };
        }

        // 点击事件处理
        function handleAdjustClick() {
            // 调整高度
            const result = adjustSidebarHeight();

            alert(`调整完成！\n底部div可见高度: ${result.bottomDivVisibleHeight}px\n侧边栏高度: ${result.sidebarHeight}px`);
